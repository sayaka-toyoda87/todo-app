<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOリスト</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Maru Gothic ProN', 'BIZ UDPGothic', sans-serif;
      background: linear-gradient(135deg, #d0f0eb 0%, #a8ddd5 50%, #b2e8e0 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      overflow-y: scroll;
    }

    .container {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 137, 123, 0.12);
      padding: 36px 32px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #00897b;
      margin-bottom: 28px;
      letter-spacing: 0.05em;
    }

    /* --- 入力フォーム --- */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 11px 16px;
      border: 1.5px solid #80cbc4;
      border-radius: 50px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      color: #444;
      transition: border-color 0.2s;
    }

    .input-row input::placeholder { color: #80cbc4; }
    .input-row input:focus { border-color: #00897b; }

    .add-btn {
      padding: 11px 20px;
      background: linear-gradient(135deg, #00897b, #26a69a);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 3px 10px rgba(0, 137, 123, 0.3);
      line-height: 1;
      flex-shrink: 0;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 14px rgba(0, 137, 123, 0.4);
    }

    /* --- フィルター --- */
    .filter-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .filter-row button {
      padding: 5px 16px;
      border-radius: 50px;
      border: 1.5px solid #80cbc4;
      background: transparent;
      color: #00897b;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .filter-row button.active,
    .filter-row button:hover {
      background: #00897b;
      color: #fff;
      border-color: #00897b;
    }

    .stats {
      text-align: center;
      font-size: 0.78rem;
      color: #26a69a;
      margin-bottom: 18px;
      min-height: 1.2em;
    }

    /* --- タスクカード --- */
    ul { list-style: none; }

    li {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 13px 12px;
      border-radius: 14px;
      margin-bottom: 8px;
      border: 1.5px solid #e0f2f1;
      background: #e0f2f118;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li.done { opacity: 0.5; background: #f5f5f5; border-color: #eee; }

    /* チェックボックス */
    li input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid #80cbc4;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
    }

    li input[type="checkbox"]:checked { background: #00897b; border-color: #00897b; }
    li input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 1px;
      width: 7px; height: 10px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(40deg);
    }

    .task-text {
      font-size: 0.95rem;
      color: #444;
      word-break: break-all;
      cursor: text;
      border-radius: 6px;
      padding: 1px 4px;
      margin: -1px -4px;
      transition: background 0.15s;
    }

    .task-text:hover { background: #e0f2f155; }

    li.done .task-text { text-decoration: line-through; color: #bbb; }

    .task-text-edit {
      font-size: 0.95rem;
      font-family: inherit;
      color: #444;
      border: 1.5px solid #00897b;
      border-radius: 8px;
      padding: 3px 8px;
      outline: none;
      width: 100%;
      background: #f0faf9;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      color: #80cbc4;
      padding: 3px 6px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #00897b; background: #e0f2f1; }

    .empty {
      text-align: center;
      color: #80cbc4;
      font-size: 0.9rem;
      padding: 32px 0 16px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>✿ TODOリスト</h1>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="新しいタスクを入力..." maxlength="100">
    <button class="add-btn" id="addBtn">＋</button>
  </div>

  <div class="filter-row">
    <button class="active" data-filter="all">すべて</button>
    <button data-filter="active">未完了</button>
    <button data-filter="done">完了済み</button>
  </div>

  <div class="stats" id="stats"></div>
  <ul id="taskList"></ul>
  <div class="empty" id="empty" style="display:none;">タスクがありません</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const { createClient } = supabase;
  const sb    = createClient(
    'https://upcfbmhmqaizldmphxmt.supabase.co',
    'sb_publishable_eBDjYtYR1cwnhZw4A4GoWQ_N2ubbDv5'
  );
  const TABLE = 'toyoda todos';

  let tasks  = [];
  let filter = 'all';

  const taskInput = document.getElementById('taskInput');
  const addBtn    = document.getElementById('addBtn');
  const taskList  = document.getElementById('taskList');
  const emptyEl   = document.getElementById('empty');
  const statsEl   = document.getElementById('stats');

  // ---- エラートースト ----
  function showError(msg) {
    let toast = document.getElementById('errToast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'errToast';
      toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#b71c1c;color:#fff;padding:10px 20px;border-radius:50px;font-size:0.85rem;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.2)';
      document.body.appendChild(toast);
    }
    toast.textContent = '⚠ ' + msg;
    toast.style.display = 'block';
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { toast.style.display = 'none'; }, 4000);
  }

  // ---- DB 操作 ----
  async function dbLoad() {
    statsEl.textContent = '読み込み中…';
    const { data, error } = await sb.from(TABLE).select('id, title, is_completed').order('id');
    if (error) { showError(error.message); statsEl.textContent = ''; return; }
    tasks = data;
    render();
  }

  async function dbInsert(task) {
    const { data, error } = await sb.from(TABLE)
      .insert({ title: task.title, is_completed: task.is_completed })
      .select('id, title, is_completed')
      .single();
    if (error) {
      showError(error.message);
      tasks = tasks.filter(t => t._tempId !== task._tempId);
      render();
      return;
    }
    // 仮IDを本物のIDに差し替え
    const idx = tasks.findIndex(t => t._tempId === task._tempId);
    if (idx !== -1) tasks[idx] = data;
    render();
  }

  async function dbUpdate(id, fields) {
    const { error } = await sb.from(TABLE).update(fields).eq('id', id);
    if (error) showError(error.message);
  }

  async function dbDelete(id) {
    const { error } = await sb.from(TABLE).delete().eq('id', id);
    if (error) showError(error.message);
  }

  // ---- レンダリング ----
  function render() {
    taskList.innerHTML = '';

    const visible = tasks.filter(t =>
      filter === 'all'    ? true :
      filter === 'active' ? !t.is_completed :
                             t.is_completed
    );

    visible.forEach(task => {
      const li = document.createElement('li');
      if (task.is_completed) li.classList.add('done');

      // チェックボックス
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = !!task.is_completed;
      cb.addEventListener('change', () => {
        task.is_completed = cb.checked;
        dbUpdate(task.id, { is_completed: task.is_completed });
        render();
      });

      // タイトル（クリックで編集）
      const textEl = document.createElement('span');
      textEl.className = 'task-text';
      textEl.textContent = task.title;
      textEl.title = 'クリックして編集';
      textEl.addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.className = 'task-text-edit';
        inp.value = task.title;
        textEl.replaceWith(inp);
        inp.focus(); inp.select();
        function commit() {
          const val = inp.value.trim();
          if (val && val !== task.title) {
            task.title = val;
            dbUpdate(task.id, { title: val });
          }
          render();
        }
        inp.addEventListener('blur', commit);
        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
          if (e.key === 'Escape') { inp.removeEventListener('blur', commit); render(); }
        });
      });

      // 削除ボタン
      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '✕';
      del.title = '削除';
      del.addEventListener('click', () => {
        tasks = tasks.filter(t => t.id !== task.id);
        dbDelete(task.id);
        render();
      });

      li.appendChild(cb);
      li.appendChild(textEl);
      li.appendChild(del);
      taskList.appendChild(li);
    });

    emptyEl.style.display = visible.length === 0 ? 'block' : 'none';

    const total = tasks.length;
    const done  = tasks.filter(t => t.is_completed).length;
    statsEl.textContent = total > 0 ? `全 ${total} 件 ／ 完了 ${done} 件` : '';
  }

  // ---- タスク追加 ----
  async function addTask() {
    const title = taskInput.value.trim();
    if (!title) return;
    taskInput.value = '';

    // 楽観的追加（仮IDで表示）
    const tempId = 'tmp_' + Date.now();
    const newTask = { _tempId: tempId, id: tempId, title, is_completed: false };
    tasks.push(newTask);
    render();

    dbInsert(newTask);
  }

  addBtn.addEventListener('click', addTask);

  document.querySelectorAll('.filter-row button').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-row button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  dbLoad();
</script>
</body>
</html>
